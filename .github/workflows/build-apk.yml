name: Build Phantom Obscura APK

on:
  push:
    branches: [ main, master, "claude/*" ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android --skip-sign-check

      - name: Accept Android SDK licenses
        run: |
          ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-$HOME/android-sdk}
          mkdir -p "$ANDROID_SDK_ROOT/licenses"
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$ANDROID_SDK_ROOT/licenses/android-sdk-license"
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> "$ANDROID_SDK_ROOT/licenses/android-sdk-license"
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> "$ANDROID_SDK_ROOT/licenses/android-sdk-license"

      - name: Restore NuGet packages
        run: |
          dotnet restore src/UI.Android/PhantomVault.Android.csproj \
            -f net9.0-android

      - name: Build APK (debug-signed, sideloadable)
        run: |
          dotnet build src/UI.Android/PhantomVault.Android.csproj \
            -f net9.0-android \
            -c Release \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:AndroidCreatePackagePerAbi=false \
            -p:EmbedAssembliesIntoApk=true \
            -p:AndroidUseSharedRuntime=false \
            -p:AndroidEnableMultiDex=true \
            -t:PackageForAndroid

      - name: Find APK files
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -not -path "*/obj/*" 2>/dev/null | sort
          echo "=== Build output directories ==="
          find src/UI.Android/bin -type d 2>/dev/null | head -20

      - name: Collect APK
        run: |
          mkdir -p artifacts
          find . -name "*.apk" -not -path "*/obj/*" -exec cp {} artifacts/ \;
          ls -lh artifacts/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: phantom-obscura-apk
          path: artifacts/*.apk
          retention-days: 30
          if-no-files-found: error
