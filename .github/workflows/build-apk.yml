name: Build Phantom Obscura APK

on:
  push:
    branches: [ main, master, "claude/*" ]
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_MULTILEVEL_LOOKUP: 0
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # setup-dotnet@v4 reads global.json and tries to install that exact SDK
      # version. Our global.json pins 9.0.100 (old Nov-2024 build) whose workload
      # packages may be gone from the feed. Wipe the version pin before setup so
      # only the dotnet-version input drives what gets installed.
      - name: Remove global.json SDK version pin for CI
        run: echo '{}' > global.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup .NET 9 (latest patch)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Print SDK info
        run: |
          dotnet --version
          dotnet --list-sdks

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android --skip-sign-check

      - name: Accept Android SDK licenses
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses 2>/dev/null || true
          mkdir -p "$ANDROID_SDK_ROOT/licenses"
          printf '%s\n' \
            24333f8a63b6825ea9c5514f83c2829b004d1fee \
            d56f5187479451eabf01fb78af6dfcb131a6481e \
            84831b9409646a918e30573bab4c9c91346d8abd \
            > "$ANDROID_SDK_ROOT/licenses/android-sdk-license"

      - name: Restore NuGet packages
        run: dotnet restore src/UI.Android/PhantomVault.Android.csproj

      - name: Publish APK (debug-signed, sideloadable)
        run: |
          dotnet publish src/UI.Android/PhantomVault.Android.csproj \
            -f net9.0-android \
            -c Release \
            -p:AndroidKeyStore=false \
            -p:AndroidPackageFormat=apk \
            -p:AndroidCreatePackagePerAbi=false \
            -p:EmbedAssembliesIntoApk=true \
            -p:AndroidUseSharedRuntime=false \
            -o ./artifacts/apk

      - name: Collect APK
        run: |
          echo "=== Artifacts ==="
          find ./artifacts -name "*.apk" | sort
          find src/UI.Android/bin -name "*.apk" 2>/dev/null | sort || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: phantom-obscura-apk
          path: |
            artifacts/apk/*.apk
            artifacts/apk/**/*.apk
          retention-days: 30
          if-no-files-found: error
