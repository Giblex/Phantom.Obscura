name: Build Phantom Obscura APK

on:
  push:
    branches: [ main, master, "claude/*" ]
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Wipe global.json so no version pin interferes with the pre-installed SDK
      - name: Clear global.json SDK pin
        run: echo '{}' > global.json

      - name: Collect environment info
        id: env_info
        if: always()
        run: |
          {
            echo "=== uname ==="
            uname -a
            echo "=== dotnet sdks ==="
            dotnet --list-sdks 2>&1 || echo "dotnet not found"
            echo "=== dotnet version ==="
            dotnet --version 2>&1 || echo "n/a"
            echo "=== DOTNET_ROOT ==="
            echo "${DOTNET_ROOT:-not set}"
            echo "=== Android SDK ==="
            ls /usr/local/lib/android/sdk 2>&1 || echo "not at /usr/local/lib/android/sdk"
            echo "=== Java ==="
            java -version 2>&1
          } | tee /tmp/env_info.txt

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install MAUI Android workload
        id: workload
        run: |
          dotnet workload install maui-android 2>&1 | tee /tmp/workload.txt
          exit ${PIPESTATUS[0]}

      - name: Accept Android SDK licenses
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses 2>/dev/null || true
          mkdir -p "$ANDROID_SDK_ROOT/licenses"
          printf '%s\n' \
            24333f8a63b6825ea9c5514f83c2829b004d1fee \
            d56f5187479451eabf01fb78af6dfcb131a6481e \
            84831b9409646a918e30573bab4c9c91346d8abd \
            > "$ANDROID_SDK_ROOT/licenses/android-sdk-license"

      - name: Restore NuGet packages
        run: dotnet restore src/UI.Android/PhantomVault.Android.csproj

      - name: Publish APK (debug-signed, sideloadable)
        run: |
          dotnet publish src/UI.Android/PhantomVault.Android.csproj \
            -f net10.0-android \
            -c Release \
            -p:AndroidKeyStore=false \
            -p:AndroidPackageFormat=apk \
            -p:AndroidCreatePackagePerAbi=false \
            -p:EmbedAssembliesIntoApk=true \
            -p:AndroidUseSharedRuntime=false \
            -o ./artifacts/apk

      - name: Collect APK
        run: |
          find ./artifacts -name "*.apk" | sort
          find src/UI.Android/bin -name "*.apk" 2>/dev/null | sort || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: phantom-obscura-apk
          path: |
            artifacts/apk/*.apk
            artifacts/apk/**/*.apk
          retention-days: 30
          if-no-files-found: error

      # Always post a diagnostic comment so env info is readable via PR comments
      - name: Post diagnostic comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ENV_INFO=$(cat /tmp/env_info.txt 2>/dev/null || echo "env info not captured")
          WORKLOAD_OUT=$(cat /tmp/workload.txt 2>/dev/null || echo "workload step did not run")
          JOB_STATUS="${{ job.status }}"
          BODY=$(python3 -c "
          import json, sys
          env = open('/tmp/env_info.txt').read() if __import__('os').path.exists('/tmp/env_info.txt') else 'not captured'
          wl = open('/tmp/workload.txt').read() if __import__('os').path.exists('/tmp/workload.txt') else 'did not run'
          body = f'''**CI run ${{ github.run_number }} — status: ${{ job.status }}**

<details><summary>Environment</summary>

\`\`\`
{env}
\`\`\`
</details>

<details><summary>Workload install</summary>

\`\`\`
{wl}
\`\`\`
</details>'''
          print(json.dumps(body))
          ")
          curl -s -f -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/Giblex-Pty-Ltd/Phantom.Obscura/issues/5/comments" \
            -d "{\"body\": $BODY}" || echo "Comment post failed"
